name: Build OpenWrt package
description: Build singbox-formula (and optionally the LuCI app) with an OpenWrt SDK.

inputs:
  openwrt_version:
    description: Full OpenWrt release, e.g. 24.10.4
    required: true
  openwrt_target:
    description: OpenWrt target/subtarget, e.g. mediatek/mt7622
    required: true
  arch:
    description: Expected package architecture, e.g. aarch64_cortex-a53
    required: true
  collect_luci:
    description: '"true" to also collect the architecture independent LuCI package'
    required: false
    default: "false"
  main_package:
    required: false
    default: singbox-formula
  luci_package:
    required: false
    default: luci-app-singbox-formula

runs:
  using: composite
  steps:
    - name: Install build dependencies
      shell: bash
      run: |
        set -eux
        sudo apt-get update
        sudo apt-get install -y \
          build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git \
          libncurses-dev libssl-dev libelf-dev \
          python3 python3-setuptools rsync swig unzip \
          zlib1g-dev file wget xz-utils zstd

    - name: Download and verify OpenWrt SDK
      shell: bash
      env:
        OPENWRT_VERSION: ${{ inputs.openwrt_version }}
        OPENWRT_TARGET: ${{ inputs.openwrt_target }}
      run: |
        set -eux

        BASE_URL="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${OPENWRT_TARGET}"
        echo "SDK base URL: ${BASE_URL}"

        wget -q "${BASE_URL}/sha256sums" -O sha256sums

        SDK_FILE="$(awk '/openwrt-sdk/ { gsub(/^\*/, "", $2); print $2; exit }' sha256sums)"
        if [ -z "${SDK_FILE}" ]; then
          echo "No OpenWrt SDK listed for ${OPENWRT_TARGET} in ${OPENWRT_VERSION}" >&2
          exit 1
        fi
        echo "Matched SDK file: ${SDK_FILE}"

        wget -q "${BASE_URL}/${SDK_FILE}" -O "${SDK_FILE}"

        awk -v f="${SDK_FILE}" '
          $2 == f || $2 == "*" f { print; found=1 }
          END { exit found ? 0 : 1 }
        ' sha256sums > sha256sums.sdk
        sha256sum -c sha256sums.sdk

        SDK_DIR="$(tar -tf "${SDK_FILE}" | head -n 1 | cut -d/ -f1)"
        test -n "${SDK_DIR}"
        tar -xf "${SDK_FILE}"
        mv "${SDK_DIR}" openwrt-sdk

    - name: Copy package sources into SDK
      shell: bash
      env:
        MAIN_PACKAGE: ${{ inputs.main_package }}
        LUCI_PACKAGE: ${{ inputs.luci_package }}
      run: |
        set -eux
        mkdir -p openwrt-sdk/package/custom
        cp -a "openwrt-feed/${MAIN_PACKAGE}" "openwrt-sdk/package/custom/${MAIN_PACKAGE}"
        cp -a "openwrt-feed/${LUCI_PACKAGE}" "openwrt-sdk/package/custom/${LUCI_PACKAGE}"
        # A prebuilt converter must never be shipped from the repository.
        test ! -e "openwrt-sdk/package/custom/${MAIN_PACKAGE}/files/usr/bin/sb-sub-c"

    - name: Update and install feeds
      shell: bash
      working-directory: openwrt-sdk
      run: |
        set -eux
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Select packages
      shell: bash
      working-directory: openwrt-sdk
      env:
        MAIN_PACKAGE: ${{ inputs.main_package }}
        LUCI_PACKAGE: ${{ inputs.luci_package }}
      run: |
        set -eux
        echo "CONFIG_PACKAGE_${MAIN_PACKAGE}=m" >> .config
        echo "CONFIG_PACKAGE_${LUCI_PACKAGE}=m" >> .config
        make defconfig
        grep -E "CONFIG_PACKAGE_(${MAIN_PACKAGE}|${LUCI_PACKAGE})=" .config

    - name: Compile packages
      shell: bash
      working-directory: openwrt-sdk
      env:
        MAIN_PACKAGE: ${{ inputs.main_package }}
        LUCI_PACKAGE: ${{ inputs.luci_package }}
      run: |
        set -eux
        make "package/custom/${MAIN_PACKAGE}/compile" V=s -j"$(nproc)"
        make "package/custom/${LUCI_PACKAGE}/compile" V=s -j"$(nproc)"

    - name: Verify the converter was cross-compiled for the target
      shell: bash
      env:
        ARCH: ${{ inputs.arch }}
      run: |
        set -eu
        CONVERTER="$(find openwrt-sdk/build_dir -type f -name sb-sub-c -perm -111 | head -n 1)"
        if [ -z "${CONVERTER}" ]; then
          echo "sb-sub-c was not produced" >&2
          exit 1
        fi
        DESCRIPTION="$(file -b "${CONVERTER}")"
        echo "${ARCH}: ${DESCRIPTION}"

        case "${ARCH}" in
          aarch64_*)     EXPECT='ELF 64-bit LSB.*ARM aarch64' ;;
          arm_*)         EXPECT='ELF 32-bit LSB.*ARM' ;;
          i386_*)        EXPECT='ELF 32-bit LSB.*Intel 80386' ;;
          x86_64)        EXPECT='ELF 64-bit LSB.*x86-64' ;;
          mips64_*)      EXPECT='ELF 64-bit MSB.*MIPS' ;;
          mipsel_*)      EXPECT='ELF 32-bit LSB.*MIPS' ;;
          mips_*)        EXPECT='ELF 32-bit MSB.*MIPS' ;;
          riscv64_*)     EXPECT='ELF 64-bit LSB.*RISC-V' ;;
          loongarch64_*) EXPECT='ELF 64-bit LSB.*LoongArch' ;;
          *)
            echo "No ELF expectation defined for ${ARCH}" >&2
            exit 1
            ;;
        esac

        if ! printf '%s\n' "${DESCRIPTION}" | grep -Eq "${EXPECT}"; then
          echo "Converter ELF does not match ${ARCH} (wanted /${EXPECT}/)" >&2
          exit 1
        fi

    - name: Collect packages
      shell: bash
      env:
        OPENWRT_VERSION: ${{ inputs.openwrt_version }}
        OPENWRT_TARGET: ${{ inputs.openwrt_target }}
        ARCH: ${{ inputs.arch }}
        COLLECT_LUCI: ${{ inputs.collect_luci }}
        MAIN_PACKAGE: ${{ inputs.main_package }}
        LUCI_PACKAGE: ${{ inputs.luci_package }}
      run: |
        set -eu
        mkdir -p output_pkg

        # OpenWrt 24.10 ships opkg (.ipk); 25.12 ships apk (.apk). Accept both
        # and keep whichever extension this release actually produced.
        MAJOR="$(printf '%s' "${OPENWRT_VERSION}" | cut -d. -f1,2)"

        copy_one() {
          name="$1"; label="$2"
          found=""
          for ext in apk ipk; do
            candidate="$(find openwrt-sdk/bin -type f -name "${name}[-_]*.${ext}" | head -n 1)"
            if [ -n "${candidate}" ]; then
              cp -v "${candidate}" "output_pkg/${label}.${ext}"
              found=1
              break
            fi
          done
          if [ -z "${found}" ]; then
            echo "No package produced for ${name}" >&2
            find openwrt-sdk/bin -type f | sort >&2 || true
            return 1
          fi
        }

        copy_one "${MAIN_PACKAGE}" "${MAIN_PACKAGE}_${ARCH}_openwrt-${MAJOR}"
        if [ "${COLLECT_LUCI}" = "true" ]; then
          copy_one "${LUCI_PACKAGE}" "${LUCI_PACKAGE}_all_openwrt-${MAJOR}"
        fi

        {
          echo "OpenWrt version: ${OPENWRT_VERSION}"
          echo "OpenWrt target:  ${OPENWRT_TARGET}"
          echo "Architecture:    ${ARCH}"
          echo "Git ref:         ${GITHUB_REF}"
          echo "Git SHA:         ${GITHUB_SHA}"
          echo "Built at:        $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        } > "output_pkg/BUILD_INFO_${ARCH}.txt"

        echo "Collected:"
        find output_pkg -maxdepth 1 -type f -print | sort
