name: Build OpenWrt APK

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: "OpenWrt release version"
        required: true
        default: "25.12.5"
      target:
        description: "OpenWrt target/subtarget"
        required: true
        default: "mediatek/mt7622"
      target_name:
        description: "Artifact target name"
        required: true
        default: "mediatek-mt7622"

permissions:
  contents: read

env:
  OPENWRT_VERSION: ${{ github.event.inputs.openwrt_version || '25.12.5' }}
  OPENWRT_TARGET: ${{ github.event.inputs.target || 'mediatek/mt7622' }}
  OPENWRT_TARGET_NAME: ${{ github.event.inputs.target_name || 'mediatek-mt7622' }}
  MAIN_PACKAGE: singbox-formula
  LUCI_PACKAGE: luci-app-singbox-formula
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: OpenWrt ${{ github.event.inputs.openwrt_version || '25.12.5' }} ${{ github.event.inputs.target || 'mediatek/mt7622' }}
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Restore executable modes after web upload
        run: sh .github/scripts/restore-executable-modes.sh "$GITHUB_WORKSPACE"

      - name: Set up pinned Go toolchain for tests
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache-dependency-path: openwrt-feed/singbox-formula/src/go.sum

      - name: Run source, shell, and converter tests
        run: |
          set -eux
          for test_script in tests/shell/test_*.sh; do
            sh "${test_script}"
          done
          node --check openwrt-feed/luci-app-singbox-formula/root/www/luci-static/resources/view/singbox-formula/overview.js
          node --check openwrt-feed/luci-app-singbox-formula/root/www/luci-static/resources/view/singbox-formula/templates.js
          sh -n openwrt-feed/luci-app-singbox-formula/root/usr/libexec/rpcd/singbox_formula
          cd openwrt-feed/singbox-formula/src
          go test -race ./...
          go vet ./...

      - name: Install build dependencies
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            g++-multilib \
            gettext \
            git \
            libncurses-dev \
            libssl-dev \
            libelf-dev \
            python3 \
            python3-setuptools \
            rsync \
            swig \
            unzip \
            zlib1g-dev \
            file \
            wget \
            xz-utils \
            zstd

      - name: Download and verify OpenWrt SDK
        run: |
          set -eux

          BASE_URL="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${OPENWRT_TARGET}"

          echo "OpenWrt version: ${OPENWRT_VERSION}"
          echo "Target: ${OPENWRT_TARGET}"
          echo "SDK base URL: ${BASE_URL}"

          wget -q "${BASE_URL}/sha256sums" -O sha256sums

          SDK_FILE="$(awk '/openwrt-sdk/ { gsub(/^\*/, "", $2); print $2; exit }' sha256sums)"

          if [ -z "${SDK_FILE}" ]; then
            echo "OpenWrt SDK file was not found in sha256sums"
            exit 1
          fi

          echo "Matched SDK file: ${SDK_FILE}"

          wget -q "${BASE_URL}/${SDK_FILE}" -O "${SDK_FILE}"

          awk -v f="${SDK_FILE}" '
            $2 == f || $2 == "*" f {
              print
              found=1
            }
            END {
              exit found ? 0 : 1
            }
          ' sha256sums > sha256sums.sdk

          sha256sum -c sha256sums.sdk

          SDK_DIR="$(tar -tf "${SDK_FILE}" | head -n 1 | cut -d/ -f1)"

          if [ -z "${SDK_DIR}" ]; then
            echo "Unable to detect SDK directory name"
            exit 1
          fi

          tar -xf "${SDK_FILE}"
          mv "${SDK_DIR}" openwrt-sdk

      - name: Cache OpenWrt downloads
        uses: actions/cache@v6
        with:
          path: openwrt-sdk/dl
          key: openwrt-dl-${{ runner.os }}-${{ env.OPENWRT_VERSION }}-${{ env.OPENWRT_TARGET_NAME }}-${{ hashFiles('**/Makefile', '**/files/**', '**/root/**', '**/po/**') }}
          restore-keys: |
            openwrt-dl-${{ runner.os }}-${{ env.OPENWRT_VERSION }}-${{ env.OPENWRT_TARGET_NAME }}-
            openwrt-dl-${{ runner.os }}-${{ env.OPENWRT_VERSION }}-

      - name: Copy package sources into SDK
        run: |
          set -eux

          PACKAGE_BASE=""

          for candidate in \
            "openwrt-feed" \
            "singbox-formula-openwrt-luci/openwrt-feed" \
            "."; do
            if [ -d "${candidate}/${MAIN_PACKAGE}" ] && [ -d "${candidate}/${LUCI_PACKAGE}" ]; then
              PACKAGE_BASE="${candidate}"
              break
            fi
          done

          if [ -z "${PACKAGE_BASE}" ]; then
            echo "Could not find package source directories. Expected one of:"
            echo "  openwrt-feed/${MAIN_PACKAGE} and openwrt-feed/${LUCI_PACKAGE}"
            echo "  ${MAIN_PACKAGE} and ${LUCI_PACKAGE} at repository root"
            exit 1
          fi

          echo "Using package base: ${PACKAGE_BASE}"

          mkdir -p openwrt-sdk/package/custom
          cp -a "${PACKAGE_BASE}/${MAIN_PACKAGE}" "openwrt-sdk/package/custom/${MAIN_PACKAGE}"
          cp -a "${PACKAGE_BASE}/${LUCI_PACKAGE}" "openwrt-sdk/package/custom/${LUCI_PACKAGE}"

          test ! -e "openwrt-sdk/package/custom/${MAIN_PACKAGE}/files/usr/bin/sb-sub-c"

      - name: Update and install feeds
        working-directory: openwrt-sdk
        run: |
          set -eux
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Select packages
        working-directory: openwrt-sdk
        run: |
          set -eux
          echo "CONFIG_PACKAGE_${MAIN_PACKAGE}=m" >> .config
          echo "CONFIG_PACKAGE_${LUCI_PACKAGE}=m" >> .config
          make defconfig
          grep -E "CONFIG_PACKAGE_(${MAIN_PACKAGE}|${LUCI_PACKAGE})=" .config

      - name: Compile packages
        working-directory: openwrt-sdk
        run: |
          set -eux
          make package/custom/${MAIN_PACKAGE}/compile V=s -j"$(nproc)"
          make package/custom/${LUCI_PACKAGE}/compile V=s -j"$(nproc)"

      - name: Verify target-built converter architecture
        run: |
          set -eux
          CONVERTER="$(find openwrt-sdk/build_dir -type f -name sb-sub-c -perm -111 | head -n 1)"
          test -n "${CONVERTER}"
          file "${CONVERTER}" | tee converter-file.txt
          grep -Eq 'ELF 64-bit.*(ARM aarch64|ARM64)' converter-file.txt

      - name: Prepare artifacts
        run: |
          set -eux

          mkdir -p output_pkg

          find openwrt-sdk/bin/packages/ -type f \( \
            -name "${MAIN_PACKAGE}*.apk" -o \
            -name "${LUCI_PACKAGE}*.apk" \
          \) -exec cp -v {} output_pkg/ \;

          if ! find output_pkg -type f -name "*.apk" | grep -q .; then
            echo "No .apk package was built. Check the OpenWrt version and target."
            find openwrt-sdk/bin/packages/ -type f | sort || true
            exit 1
          fi

          {
            echo "OpenWrt version: ${OPENWRT_VERSION}"
            echo "OpenWrt target: ${OPENWRT_TARGET}"
            echo "Target name: ${OPENWRT_TARGET_NAME}"
            echo "Git ref: ${GITHUB_REF}"
            echo "Git SHA: ${GITHUB_SHA}"
            echo "Built at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > output_pkg/BUILD_INFO.txt

          (
            cd output_pkg
            sha256sum *.apk > SHA256SUMS
          )

          echo "Generated packages:"
          find output_pkg -maxdepth 1 -type f -print | sort

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v6
        with:
          name: singbox-formula-${{ env.OPENWRT_VERSION }}-${{ env.OPENWRT_TARGET_NAME }}
          path: output_pkg/*
          if-no-files-found: error
          retention-days: 30
